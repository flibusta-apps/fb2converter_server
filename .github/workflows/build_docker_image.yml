name: Build docker image

on:
  push:
    branches:
      - "main"

jobs:
  Build-Docker-Image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - id: repository_name
        run: |
          repo="${{ github.repository }}"
          echo "lowercase=$(echo \"$repo\" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        env:
          IMAGE: ${{ steps.repository_name.outputs.lowercase }}
        with:
          push: true
          tags: ghcr.io/${{ env.IMAGE }}:latest,ghcr.io/${{ env.IMAGE }}:${{ github.sha }}
          context: .
          file: ./docker/build.dockerfile

      - name: Invoke deployment hook
        uses: joelwmale/webhook-action@master
        with:
          url: ${{ secrets.WEBHOOK_URL }}?CONVERTER_TAG=${{ github.sha }}
